<!DOCTYPE html>
<html>
<head>
    <title>Employees</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>👥 Employees</h1>

    <nav>

<a href="/home">🏠 Home</a>

<a href="/employees">👥 Employees</a>

<a href="/tasks">📋 Tasks</a>

<a href="/assign">⚡ Assign</a>

</nav>

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Employee Name"
            required
        >

        <input
            type="text"
            name="skill"
            placeholder="Employee Skill"
            required
        >

        <button type="submit">
            ➕ Add Employee
        </button>

    </form>

    <h2>Employee List</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Skill</th>
            <th>Available</th>
        </tr>

        {% for employee in employees %}

        <tr>
            <td>{{ employee[0] }}</td>
            <td>{{ employee[1] }}</td>
            <td>{{ employee[2] }}</td>
            <td>
                {% if employee[3] %}
                    ✅ Available
                {% else %}
                    ❌ Busy
                {% endif %}
            </td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
